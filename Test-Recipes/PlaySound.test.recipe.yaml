---
# https://github.com/jgstew/jgstew-recipes/tree/main/SharedProcessors/PlaySound.py
Description: Test PlaySound Processor
Identifier: com.github.jgstew.test.PlaySound
Input:
  NAME: PlaySoundTest
MinimumVersion: "2.4.1"
Process:
  # download a tiny WAV to play (1.3 KB beep from Wikimedia Commons):
  - Processor: com.github.jgstew.SharedProcessors/URLDownloaderPython
    Arguments:
      url: https://upload.wikimedia.org/wikipedia/commons/9/98/Beepalert.wav
      User_Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36
      filename: beep.wav
      download_version: ""
      COMPUTE_HASHES: False

  # play the downloaded sound (best-effort: won't fail on a headless host):
  - Processor: com.github.jgstew.SharedProcessors/PlaySound
    Arguments:
      sound_file_path: "%RECIPE_CACHE_DIR%/downloads/beep.wav"

  # confirm the processor resolved the sound file path it played:
  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%sound_file_path%"
      assert_string: "beep.wav"
