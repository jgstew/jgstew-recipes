---
# https://github.com/jgstew/jgstew-recipes/tree/main/SharedProcessors/SevenZip.py
# Requires the 7z executable (Ubuntu: p7zip-full, macOS: brew install p7zip).
Description: Test SevenZip Processor
Identifier: com.github.jgstew.test.SevenZip
Input:
  NAME: SevenZipTest
MinimumVersion: "2.4.1"
Process:
  # create a file to archive:
  - Processor: com.github.jgstew.SharedProcessors/FileTouch
    Arguments:
      pathname: "%RECIPE_CACHE_DIR%/sevenzip_test/hello.txt"
      touch_create_folders: true

  # create a 7z archive of that file (relative_directory changes into the subdir
  # so the archive and its input are side by side):
  - Processor: com.github.jgstew.SharedProcessors/SevenZip
    Arguments:
      relative_directory: "sevenzip_test"
      ignore_errors: false
      sevenzip_args:
        - "a"
        - "test.7z"
        - "hello.txt"

  # confirm the archive was created and is a real 7-zip archive:
  - Processor: com.github.jgstew.SharedProcessors/FileGetMagicType
    Arguments:
      file_pathname: "%RECIPE_CACHE_DIR%/sevenzip_test/test.7z"

  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%file_magic_type%"
      assert_string: "7-zip"
