---
# https://github.com/jgstew/jgstew-recipes/tree/main/SharedProcessors/ColorThief.py
Description: Test ColorThief Processor
Identifier: com.github.jgstew.test.ColorThief
Input:
  NAME: ColorThiefTest
MinimumVersion: "2.4.1"
Process:
  # download an image to analyze:
  - Processor: com.github.jgstew.SharedProcessors/URLDownloaderPython
    Arguments:
      url: https://raw.githubusercontent.com/jgstew/jgstew.github.io/refs/heads/master/images/BigFix/BigFix_logo_DevSite_512.png
      filename: "%NAME%.png"
      download_version: ""
      COMPUTE_HASHES: False

  # CASE 1: extract the dominant color and a 5-color palette:
  - Processor: com.github.jgstew.SharedProcessors/ColorThief
    Arguments:
      file_pathname: "%RECIPE_CACHE_DIR%/downloads/%NAME%.png"
      color_count: 5

  # the dominant color should be a #RRGGBB hex string:
  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%dominant_color_hex%"
      assert_string: "#"

  # the dominant color should also be reported as an r,g,b string:
  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%dominant_color_rgb%"
      assert_string: ","

  # the palette array should contain hex colors:
  - Processor: com.github.jgstew.SharedProcessors/VariableToString
    Arguments:
      input_variable: palette_colors
  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%palette_colors%"
      assert_string: "#"

  # CASE 2: a smaller palette still yields a dominant color:
  - Processor: com.github.jgstew.SharedProcessors/ColorThief
    Arguments:
      file_pathname: "%RECIPE_CACHE_DIR%/downloads/%NAME%.png"
      color_count: 2

  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%dominant_color_hex%"
      assert_string: "#"
