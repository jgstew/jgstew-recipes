---
Description: Downloads the latest NVD Data Feeds JSON for the current year (or a specified year). Input TYPE must be `gz` or `zip`. Input YEAR must be 2002 or later; defaults to the current year if not specified.
# https://nvd.nist.gov/vuln/data-feeds#JSON_FEED
Identifier: com.github.jgstew.download.NVD-Data-Feeds-JSON-CurrentYear
Input:
  NAME: "NVD-Data-Feeds-JSON-CurrentYear"
  # TYPE must be `gz` or `zip`
  TYPE: "zip"
  # YEAR must be 2002+
  # if YEAR not specified, then the current year will be used
  # YEAR: "2020"
MinimumVersion: '2.4.1'
Process:
  # DangerousEvaluate is a bad idea - I kind of love it - I also hate it.
  - Processor: com.github.jgstew.SharedDangerousProcessors/DangerousEvaluate
    Arguments:
      # verify TYPE is `gz` or `zip` otherwise HALT
      evaluate_string: 'self.env["stop_processing_recipe"] = True if "zip" not in self.env.get("TYPE") and "gz" not in self.env.get("TYPE") else False'
  - Processor: com.github.jgstew.SharedDangerousProcessors/DangerousEvaluate
    Arguments:
      # set current YEAR if unset
      evaluate_string: 'if not self.env.get("YEAR"): from datetime import datetime; self.env["YEAR"] = datetime.today().strftime("%Y")'
  - Processor: com.github.jgstew.SharedProcessors/URLDownloaderPython
    Arguments:
      # FROM: https://nvd.nist.gov/vuln/data-feeds#divJson20Feeds
      # https://nvd.nist.gov/feeds/json/cve/2.0/nvdcve-2.0-2026.json.zip
      url: https://nvd.nist.gov/feeds/json/cve/2.0/nvdcve-2.0-%YEAR%.json.%TYPE%
  - Processor: EndOfCheckPhase
  # - Processor: com.github.jgstew.SharedProcessors/StopProcessingIfDownloadUnchanged
  - Processor: com.github.jgstew.SharedProcessors/URLDownloaderPython
    Arguments:
      url: https://nvd.nist.gov/feeds/json/cve/2.0/nvdcve-2.0-%YEAR%.meta
  - Processor: com.github.jgstew.SharedDangerousProcessors/DangerousEvaluate
    Arguments:
      # print current self.env
      evaluate_string: 'print(self.env)'
