---
# https://github.com/jgstew/jgstew-recipes/tree/main/SharedProcessors/FileExeGetInfoPeExpanded.py
Description: Test FileExeGetInfoPeExpanded Processor
Identifier: com.github.jgstew.test.FileExeGetInfoPeExpanded
Input:
  NAME: FileExeGetInfoPeExpandedTest
MinimumVersion: "2.4.1"
Process:
  # download a known signed Windows PE (Apple SoftwareUpdate.exe, x86, 2008):
  - Processor: com.github.jgstew.SharedProcessors/URLDownloaderPython
    Arguments:
      url: https://raw.githubusercontent.com/ralphje/signify/master/tests/test_data/SoftwareUpdate.exe
      filename: SoftwareUpdate.exe
      download_version: ""
      COMPUTE_HASHES: False

  # extract structural PE info:
  - Processor: com.github.jgstew.SharedProcessors/FileExeGetInfoPeExpanded
    Arguments:
      file_pathname: "%RECIPE_CACHE_DIR%/downloads/SoftwareUpdate.exe"

  # architecture should be detected as x86:
  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%file_pe_machine%"
      assert_string: "x86"

  # compile date should be read from the PE header:
  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%file_pe_compile_date%"
      assert_string: "2008-07-25"

  # subsystem should be a windowed GUI app:
  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%file_pe_subsystem%"
      assert_string: "windows_gui"

  # it is an EXE, not a DLL:
  - Processor: com.github.jgstew.SharedProcessors/VariableToString
    Arguments:
      input_variable: file_pe_is_exe
  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%file_pe_is_exe%"
      assert_string: "True"

  # the standard .text code section should be present:
  - Processor: com.github.jgstew.SharedProcessors/VariableToString
    Arguments:
      input_variable: file_pe_sections
  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%file_pe_sections%"
      assert_string: ".text"

  # it imports the core Windows KERNEL32.dll:
  - Processor: com.github.jgstew.SharedProcessors/VariableToString
    Arguments:
      input_variable: file_pe_imported_dlls
  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%file_pe_imported_dlls%"
      assert_string: "KERNEL32.dll"
