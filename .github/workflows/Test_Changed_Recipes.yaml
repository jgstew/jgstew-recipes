---
name: Test Changed Recipes

# On push/PR: test only the changed recipes.
# Once a month (and on manual dispatch): test ALL recipes that can run headless,
# to catch vendor URL rot and processor regressions over time.
on:
  push:
    paths:
      - "**.recipe.yaml"
  pull_request:
    paths:
      - "**.recipe.yaml"
  schedule:
    # 08:00 UTC on the 1st of every month
    - cron: "0 8 1 * *"
  workflow_dispatch: {}

jobs:
  TestChangedRecipes:
    runs-on: ubuntu-latest
    # the monthly all-recipes run needs much more time than a changed-files run:
    timeout-minutes: 300
    name: Test recipes
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2 # OR "2" -> To retrieve the preceding commit.

      - name: Get changed files
        id: changed-files
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v47
        with:
          files: "**.recipe.yaml"
          # Ignore windows only recipes:
          files_ignore: |
            AutoPkgRecipe/AutoPkgRelease.nupkg.recipe.yaml

      # Build the recipe list. On a scheduled/manual run, include ALL recipes that
      # can run headless in CI; on push/PR, use only the changed recipes.
      - name: Build recipe list
        id: build-list
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Scheduled/manual run: testing ALL headless-runnable recipes."
            # Exclusions:
            #   *.bigfix.recipe.yaml          -> require a BigFix server + credentials
            #   AutoPkgRelease.nupkg.recipe   -> windows only
            #   TextToSpeechWeather.example   -> requires API_IPINFO / API_OPENWEATHER keys
            find . -name "*.recipe.yaml" \
              -not -path "./autopkg/*" \
              -not -name "*.bigfix.recipe.yaml" \
              -not -name "AutoPkgRelease.nupkg.recipe.yaml" \
              -not -name "TextToSpeechWeather.example.recipe.yaml" \
              | sort > TestRecipesAction.txt
          else
            echo "Push/PR run: testing changed recipes only."
            for file in ${{ steps.changed-files.outputs.all_changed_and_modified_files }}; do
              echo "$file" >> TestRecipesAction.txt
            done
          fi
          if [ -s TestRecipesAction.txt ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "--- recipes to test ($(wc -l < TestRecipesAction.txt)): ---"
            cat TestRecipesAction.txt
          else
            echo "No recipes to test."
          fi

      - name: Install prereq
        if: steps.build-list.outputs.should_run == 'true'
        run: sudo apt-get install -y msitools speech-dispatcher libssl-dev libxml2-dev libxslt1-dev zlib1g-dev python3-dev ffmpeg p7zip-full libmagic1 libcairo2

      - name: Read Python version
        if: steps.build-list.outputs.should_run == 'true'
        id: pyver
        shell: bash
        run: echo "version=$(cat .python-version)" >> $GITHUB_OUTPUT

      - name: setup-autopkg
        if: steps.build-list.outputs.should_run == 'true'
        uses: ./.github/actions/setup-autopkg
        with:
          use-python-version: ${{ steps.pyver.outputs.version }}

      - name: Install repo requirements
        if: steps.build-list.outputs.should_run == 'true'
        run: pip install --requirement requirements.txt

      - name: add recipe repos
        if: steps.build-list.outputs.should_run == 'true'
        run: |
          for line in $(cat .autopkg_repos.txt); do python autopkg/Code/autopkg repo-add $line; done

      - name: config git for 1 particular recipe
        if: steps.build-list.outputs.should_run == 'true'
        run: |
          git config --global user.email "actions@github"
          git config --global user.name "GitHub Actions"

      - name: Fix oscrypto for Linux
        if: runner.os == 'Linux' && steps.build-list.outputs.should_run == 'true'
        run: |
          pip uninstall oscrypto -y
          pip install git+https://github.com/wbond/oscrypto.git@d5f3437

      - name: Set token
        # required for githubreleaseinfoprovider in github actions
        # without this, API limits will be hit
        if: steps.build-list.outputs.should_run == 'true'
        run: |
          cd ~
          echo ${{ secrets.GITHUB_TOKEN }} > ".autopkg_gh_token"

      - name: run recipe autopkg
        id: autopkg-run
        if: steps.build-list.outputs.should_run == 'true'
        run: |
          python autopkg/Code/autopkg run -vv \
            --recipe-list TestRecipesAction.txt \
            --report-plist "${RUNNER_TEMP}/autopkg_report.plist"

      # Parse the autopkg report and write a failure summary to the GitHub Actions
      # job summary. Runs even when the recipe run failed (if: always()).
      - name: Summarize failures
        if: always() && steps.build-list.outputs.should_run == 'true'
        run: |
          python3 - <<'PYEOF'
          import os
          import plistlib

          # emoji via \u escapes so this workflow file stays pure ASCII:
          ICON_FAIL = "\u274c"  # cross mark
          ICON_PASS = "\u2705"  # check mark
          ICON_WARN = "\u26a0\ufe0f"  # warning sign

          report = os.path.join(os.environ["RUNNER_TEMP"], "autopkg_report.plist")
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          try:
              with open("TestRecipesAction.txt", encoding="utf-8") as handle:
                  total = len([line for line in handle if line.strip()])
          except FileNotFoundError:
              total = 0

          failures = []
          report_exists = os.path.isfile(report)
          if report_exists:
              with open(report, "rb") as handle:
                  failures = plistlib.load(handle).get("failures", []) or []

          lines = ["# AutoPkg Recipe Test Results", "", f"Ran **{total}** recipe(s).", ""]

          if failures:
              lines.append(f"## {ICON_FAIL} {len(failures)} of {total} failed")
              lines.append("")
              lines.append("| Recipe | Error |")
              lines.append("| --- | --- |")
              for item in failures:
                  recipe = str(item.get("recipe", "?"))
                  if recipe.startswith("./"):
                      recipe = recipe[2:]
                  message = " ".join(str(item.get("message", "")).split())
                  if len(message) > 300:
                      message = message[:297] + "..."
                  recipe = recipe.replace("|", "\\|")
                  message = message.replace("|", "\\|")
                  lines.append(f"| `{recipe}` | {message} |")
          elif report_exists:
              lines.append(f"## {ICON_PASS} All {total} recipe(s) passed")
          else:
              lines.append(
                  f"## {ICON_WARN} No report produced "
                  "(the run may have crashed before writing it)"
              )

          summary = "\n".join(lines) + "\n"
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write(summary)
          print(summary)

          # fail the job if any recipe failed (covers the case where autopkg
          # somehow exits 0 despite failures):
          if failures:
              raise SystemExit(1)
          PYEOF
