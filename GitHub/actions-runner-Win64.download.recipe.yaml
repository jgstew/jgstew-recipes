---
Description: Downloads the latest version of GitHub actions-runner. Input TYPE is the archive format (e.g. `zip`). Input OS is the platform string used in the asset filename (e.g. `win-x64`).
Identifier: com.github.jgstew.download.actions-runner-Win64
Input:
  NAME: "actions-runner"
  TYPE: "zip"
  OS: win-x64
MinimumVersion: "2.4.1"
ParentRecipe: com.github.jgstew.shared.parent-recipe
Process:
  # see: https://github.com/actions/runner/releases
  - Processor: GitHubReleasesInfoProvider
    Arguments:
      github_repo: actions/runner
      # https://github.com/actions/runner/releases/download/v2.335.1/actions-runner-win-x64-2.335.1.zip
      #  actions-runner-win-x64-2.335.1.zip
      asset_regex: 'actions-runner-%OS%-.+\.%TYPE%$'
      include_prereleases: False
      # curl_opts: ["--raw"]

  - Processor: com.github.jgstew.SharedProcessors/URLDownloaderPython
    Arguments:
      filename: actions-runner-%OS%.%TYPE%
      #download_version: "%version%"
      COMPUTE_HASHES: True

  - Processor: EndOfCheckPhase

  - Processor: com.github.jgstew.SharedProcessors/BigFixPrefetchItem
