---
# https://github.com/jgstew/jgstew-recipes/tree/main/SharedProcessors/FileAudioConvert.py
Description: Test FileAudioConvert Processor
Identifier: com.github.jgstew.test.FileAudioConvert
Input:
  NAME: FileAudioConvertTest
MinimumVersion: "2.4.1"
Process:
  # download a real .oga (Ogg Vorbis) audio file to convert:
  - Processor: com.github.jgstew.SharedProcessors/URLDownloaderPython
    Arguments:
      url: https://upload.wikimedia.org/wikipedia/commons/8/81/Heart_Monitor_Beep--freesound.org.oga
      filename: beep.oga
      download_version: ""
      COMPUTE_HASHES: False
      User_Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36

  # confirm the file is actually a Vorbis audio file:
  - Processor: com.github.jgstew.SharedProcessors/FileGetMagicType

  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%file_magic_type%"
      assert_string: "Ogg data, Vorbis audio"

  # convert the .oga to .wav:
  - Processor: com.github.jgstew.SharedProcessors/FileAudioConvert
    Arguments:
      file_pathname: "%RECIPE_CACHE_DIR%/downloads/beep.oga"
      output_format: wav
      raise_error: true

  # confirm the output is actually a WAV file:
  - Processor: com.github.jgstew.SharedProcessors/FileGetMagicType
    Arguments:
      file_pathname: "%file_path_audio%"

  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%file_magic_type%"
      assert_string: "WAVE audio"
