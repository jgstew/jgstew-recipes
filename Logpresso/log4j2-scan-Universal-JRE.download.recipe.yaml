---
Description: Downloads a specific version of the universal log4j2-scan JAR bundled with JRE. Input TYPE must be `zip`, `7z`, or `tar.gz`. Input OS is the platform suffix in the asset filename (empty string for universal). Input version pins the specific release version to download.
Identifier: com.github.jgstew.download.log4j2-scan-Universal-JRE
Input:
  NAME: "log4j2-scan"
  # TYPE must be `zip` or `7z` or `tar.gz`
  TYPE: jar
  OS: ""
  version: "2.7.1"
MinimumVersion: "2.4.1"
ParentRecipe: com.github.jgstew.download.log4j2-scan-Win64
Process:
  - Processor: EndOfCheckPhase
