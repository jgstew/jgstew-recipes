---
Description: Downloads the latest NVD CPE Dictionary XML. Input TYPE must be `gz` or `zip`. Input cpe_version must be `2.3` or `2.2`.
Identifier: com.github.jgstew.download.NVD-CPE-Dictionary-XML
Input:
  NAME: "NVD-CPE-Dictionary-XML"
  # TYPE must be `gz` or `zip`
  TYPE: "zip"
  # cpe_version must be "2.3" or "2.2"
  cpe_version: "2.3"
MinimumVersion: "2.4.1"
Process:
  - Processor: com.github.jgstew.SharedProcessors/URLDownloaderPython
    Arguments:
      # https://nvd.nist.gov/feeds/xml/cpe/dictionary/official-cpe-dictionary_v2.3.xml.zip
      # https://nvd.nist.gov/feeds/json/cpe/2.0/nvdcpe-2.0.zip
      url: https://nvd.nist.gov/feeds/json/cpe/2.0/nvdcpe-2.0.zip

  - Processor: EndOfCheckPhase
