---
# https://github.com/jgstew/jgstew-recipes/tree/main/SharedProcessors/FileArchiveListContents.py
Description: Test FileArchiveListContents Processor
Identifier: com.github.jgstew.test.FileArchiveListContents
Input:
  NAME: FileArchiveListContentsTest
MinimumVersion: "2.4.1"
Process:
  # `SharedUtilityMethods` must come first
  - Processor: com.github.jgstew.SharedProcessors/SharedUtilityMethods

  - Processor: com.github.jgstew.SharedProcessors/URLDownloaderPython
    Arguments:
      url: http://software.bigfix.com/download/redist/unzip-5.52.exe
      COMPUTE_HASHES: False

  # list the contents of the downloaded archive without extracting:
  - Processor: com.github.jgstew.SharedProcessors/FileArchiveListContents

  - Processor: com.github.jgstew.SharedProcessors/VariableToString
    Arguments:
      input_variable: archive_file_count

  # confirm the archive listing found at least one entry:
  - Processor: com.github.jgstew.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%archive_file_count%"
      assert_string: "3"
